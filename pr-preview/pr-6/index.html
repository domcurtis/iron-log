<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Iron Log</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000; --card: #0a0a0a; --border: #151515; --border2: #1a1a1a;
    --input-bg: #111; --input-border: #222; --text: #e0e0e0; --text2: #888;
    --text3: #555; --text4: #444; --green: #22c55e; --red: #ef4444;
    --font: 'Space Grotesk', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    max-width: 480px; margin: 0 auto; min-height: 100vh;
    -webkit-font-smoothing: antialiased; padding-bottom: 80px;
  }
  input[type="number"], input[type="text"] {
    background: var(--input-bg); border: 1px solid var(--input-border);
    border-radius: 8px; padding: 14px 10px; color: var(--text); font-size: 16px;
    font-family: var(--mono); text-align: center; outline: none; width: 100%;
    -webkit-appearance: none; appearance: none; min-height: 48px;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]:focus, input[type="text"]:focus { border-color: var(--green); background: #151515; }
  input.prefilled { color: var(--text3); }
  button { font-family: var(--font); cursor: pointer; -webkit-tap-highlight-color: transparent; }

  .header { padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--green); }
  .header-actions { display: flex; gap: 8px; }
  .header-actions button {
    background: var(--card); border: 1px solid var(--border2); color: var(--text);
    font-size: 14px; font-weight: 500; padding: 8px 12px; border-radius: 8px;
    min-height: 38px;
  }
  .header-actions button:active { border-color: var(--green); color: var(--green); }
  .date-bar { padding: 8px 20px 0; font-size: 12px; color: var(--text4); font-family: var(--mono); }

  .section { padding: 20px; }
  .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); margin-bottom: 16px; }
  .template-btn {
    display: block; width: 100%; padding: 16px 14px; margin-bottom: 8px;
    background: var(--card); border: 1px solid var(--border2); border-radius: 12px;
    color: var(--text); text-align: left; cursor: pointer;
  }
  .template-btn:active { border-color: #333; }
  .template-btn .name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .template-btn .meta { font-size: 12px; color: var(--text3); }
  .create-btn {
    display: block; width: 100%; padding: 16px 14px; margin-top: 4px;
    background: transparent; border: 1px dashed #333; border-radius: 12px;
    color: var(--green); font-size: 15px;
  }

  .exercise-card {
    background: var(--card); border-radius: 12px; padding: 16px;
    margin-bottom: 12px; border: 1px solid var(--border);
  }
  .exercise-card.all-done { border-color: rgba(34,197,94,0.2); }
  .exercise-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
  .exercise-header .title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .exercise-header h3 { font-size: 16px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .exercise-header h3.done { color: var(--green); }
  .exercise-header .spec { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .ex-ctrls { display: flex; gap: 4px; flex-shrink: 0; }
  .ex-ctrl-btn {
    background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text2);
    width: 34px; height: 34px; border-radius: 8px; font-size: 16px; font-family: var(--mono);
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .ex-ctrl-btn:disabled { opacity: 0.25; }
  .ex-ctrl-btn:not(:disabled):active { border-color: var(--green); color: var(--green); }
  .ex-ctrl-btn.remove:active { border-color: var(--red); color: var(--red); }

  .add-ex-fields { display: flex; gap: 8px; }
  .add-ex-fields > div { flex: 1; }
  .add-ex-fields label { display: block; font-size: 10px; color: var(--text4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .col-labels { display: flex; gap: 8px; padding: 4px 0 4px 32px; margin-bottom: 2px; }
  .col-labels span { font-size: 10px; color: var(--text4); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
  .col-labels .w { flex: 1; }
  .col-labels .r { width: 72px; }
  .col-labels .c { width: 48px; }

  .set-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border2); }
  .set-row.completed { opacity: 0.5; }
  .set-num { width: 32px; font-size: 13px; color: var(--text3); font-family: var(--mono); text-align: center; flex-shrink: 0; font-weight: 600; }
  .set-row .weight-input { flex: 1; }
  .set-row .reps-input { width: 72px; flex-shrink: 0; }
  .check-btn {
    width: 48px; height: 48px; border-radius: 10px; border: none;
    background: var(--border2); color: var(--text4); font-size: 22px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .check-btn.done { background: var(--green); color: #000; }
  .check-btn:active { transform: scale(0.92); }

  .progress-wrap { margin: 12px 0 20px; }
  .progress-labels { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: var(--text4); font-family: var(--mono); }
  .progress-track { height: 3px; background: var(--border2); border-radius: 2px; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s ease; }

  .primary-btn {
    width: 100%; padding: 14px; background: var(--green); border: none; border-radius: 10px;
    color: #000; font-size: 16px; font-weight: 700;
  }
  .primary-btn:disabled { background: var(--border2); color: var(--text4); cursor: default; }
  .finish-btn { padding: 16px; border-radius: 12px; margin-top: 12px; font-size: 16px; transition: all 0.2s; }
  .link-btn { background: none; border: none; color: var(--green); font-size: 14px; cursor: pointer; }
  .cancel-link { background: none; border: none; color: var(--text3); font-size: 13px; }
  .cancel-link-sm { background: none; border: none; color: var(--text3); font-size: 14px; }

  .form-exercise {
    background: var(--card); border-radius: 10px; padding: 12px;
    margin-bottom: 8px; border: 1px solid var(--border);
  }
  .form-exercise .top-row { display: flex; gap: 8px; align-items: center; }
  .form-exercise .top-row input { flex: 1; text-align: left; }
  .form-exercise .bottom-row { display: flex; gap: 8px; margin-top: 8px; }
  .form-exercise .bottom-row > div { flex: 1; }
  .form-exercise label { display: block; font-size: 10px; color: var(--text4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .remove-btn { background: none; border: none; color: var(--text3); font-size: 18px; padding: 4px; }
  .add-exercise-btn {
    width: 100%; padding: 12px; background: transparent; border: 1px dashed #333;
    border-radius: 8px; color: var(--green); font-size: 14px; margin-top: 4px; margin-bottom: 16px;
  }

  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .export-btn {
    background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px;
    padding: 12px 18px; color: var(--green); font-size: 15px; font-weight: 600; font-family: var(--mono);
    min-height: 44px;
  }
  .export-btn:active { border-color: var(--green); }
  .log-card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 1px solid var(--border); }
  .log-card .top { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .log-card .top .name { font-size: 16px; font-weight: 600; }
  .log-card .top .date { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .log-card .ex-name { font-size: 13px; color: var(--text2); }
  .log-card .ex-sets { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; margin-bottom: 6px; }
  .log-card .card-actions { display: flex; gap: 8px; margin-top: 8px; }
  .log-card .edit-btn { background: none; border: 1px solid var(--input-border); border-radius: 6px; padding: 6px 14px; color: var(--text2); font-size: 12px; font-family: var(--mono); cursor: pointer; }
  .log-card .delete-log-btn { background: none; border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; padding: 6px 14px; color: var(--red); font-size: 12px; font-family: var(--mono); cursor: pointer; }

  .last-hint {
    font-size: 13px; color: var(--text); font-family: var(--mono);
    margin: 4px 0 10px; padding: 10px 12px;
    background: rgba(34,197,94,0.06); border-left: 3px solid rgba(34,197,94,0.5); border-radius: 6px;
    display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: center;
  }
  .last-hint .last-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--font); font-weight: 600; }
  .last-hint .last-set { color: var(--text); font-weight: 500; }
  .last-hint .last-sep { color: var(--text4); }

  .ex-history-card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 1px solid var(--border); }
  .ex-history-card .ex-h-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .ex-history-card .ex-h-row { display: flex; justify-content: space-between; font-size: 12px; font-family: var(--mono); padding: 4px 0; border-bottom: 1px solid var(--border); }
  .ex-history-card .ex-h-date { color: var(--text3); }
  .ex-history-card .ex-h-data { color: var(--text2); }

  .template-manage-card {
    background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 8px;
    border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
  }
  .template-manage-card .info .name { font-size: 16px; font-weight: 600; }
  .template-manage-card .info .exercises { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .delete-btn { background: none; border: none; color: var(--red); font-size: 20px; padding: 4px 8px; }

  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); display: flex; align-items: center;
    justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-box {
    background: #111; border-radius: 16px; padding: 24px; max-width: 320px;
    width: 100%; text-align: center;
  }
  .modal-box p { font-size: 15px; color: #ccc; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; }
  .modal-no { background: #222; color: var(--text2); }
  .modal-yes { background: var(--green); color: #000; font-weight: 700; }

  .import-upload-area {
    border: 2px dashed var(--input-border); border-radius: 12px; padding: 40px 20px;
    text-align: center; cursor: pointer; transition: border-color 0.2s;
  }
  .import-upload-area:hover, .import-upload-area.dragover { border-color: var(--green); }
  .import-upload-area input[type="file"] { display: none; }
  .import-upload-area .upload-icon { font-size: 32px; margin-bottom: 8px; color: var(--text3); }
  .import-upload-area .upload-text { font-size: 14px; color: var(--text2); }
  .import-upload-area .upload-hint { font-size: 12px; color: var(--text4); margin-top: 6px; }
  .import-status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; font-family: var(--mono); }
  .import-status.success { background: rgba(34,197,94,0.1); color: var(--green); }
  .import-status.error { background: rgba(239,68,68,0.1); color: var(--red); }

  .swap-picker {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92); z-index: 150;
    display: flex; flex-direction: column; padding: 16px;
  }
  .swap-picker-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; max-width: 480px; width: 100%; margin: 0 auto;
    display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0;
  }
  .swap-picker-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .swap-picker-head h3 { font-size: 16px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
  .swap-picker-close { background: none; border: none; color: var(--text2); font-size: 28px; line-height: 1; padding: 0 4px; }
  .swap-picker-search { text-align: left !important; }
  .swap-picker-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 6px; }
  .swap-picker-item {
    width: 100%; background: var(--input-bg); border: 1px solid var(--input-border);
    border-radius: 10px; padding: 14px 14px; color: var(--text); text-align: left;
    font-size: 15px; min-height: 48px; display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .swap-picker-item:active { border-color: var(--green); }
  .swap-picker-item .item-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); flex-shrink: 0; }
  .swap-picker-empty { color: var(--text3); font-size: 13px; text-align: center; padding: 20px; }

  .edit-template-btn {
    background: none; border: 1px solid var(--input-border); border-radius: 6px;
    padding: 6px 12px; color: var(--text2); font-size: 12px; font-family: var(--mono);
    margin-right: 4px;
  }
  .edit-template-btn:active { border-color: var(--green); color: var(--green); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="modal-text"></p>
    <div class="modal-btns">
      <button class="modal-no" onclick="closeModal()">Cancel</button>
      <button class="modal-yes" id="modal-confirm" onclick="confirmModal()">Confirm</button>
    </div>
  </div>
</div>

<div class="header">
  <h1><span>■</span> IRON LOG</h1>
  <div class="header-actions" id="header-actions"></div>
</div>
<div id="date-bar" class="date-bar"></div>
<div id="app"></div>

<script>
const DEFAULT_PLAN_ID = "tp1";
const DEFAULT_TRAINING_PLANS = [{ id: DEFAULT_PLAN_ID, name: "Training Plan 1" }];
const DEFAULT_TEMPLATES = [
  { id:"t1", trainingPlanId:DEFAULT_PLAN_ID, name:"① Lower (Uni)", exercises:[
    {name:"Back Squat",sets:3,reps:"8-10"},{name:"Bulg. Split Squat",sets:3,reps:"10"},
    {name:"Leg Curls",sets:3,reps:"10-12"},{name:"Calf Raise",sets:3,reps:"15"},
    {name:"Cable Crunch",sets:3,reps:"15"},{name:"Wood Chops",sets:2,reps:"15"}
  ]},
  { id:"t2", trainingPlanId:DEFAULT_PLAN_ID, name:"② Upper (Pull)", exercises:[
    {name:"BB Rows",sets:4,reps:"6-8"},{name:"Incl. DB Bench",sets:3,reps:"10"},
    {name:"Lat Pull Down",sets:3,reps:"8-10"},{name:"1 Arm LM Press",sets:3,reps:"10"},
    {name:"Face Pulls",sets:3,reps:"15-20"},{name:"DB Curl",sets:3,reps:"8-12"}
  ]},
  { id:"t3", trainingPlanId:DEFAULT_PLAN_ID, name:"③ Lower (Hinge)", exercises:[
    {name:"RDL",sets:4,reps:"8-10"},{name:"Hack Squat",sets:3,reps:"10-12"},
    {name:"Hip Thrust",sets:3,reps:"10-12"},{name:"Leg Extension",sets:3,reps:"12-15"},
    {name:"Pallof Press",sets:3,reps:"10"},{name:"Leg Raises",sets:3,reps:"15"}
  ]},
  { id:"t4", trainingPlanId:DEFAULT_PLAN_ID, name:"④ Upper (Row)", exercises:[
    {name:"LM Row",sets:4,reps:"8-10"},{name:"Incl. Bench Press",sets:3,reps:"10-12"},
    {name:"1 Arm DB Row",sets:3,reps:"10-12"},{name:"Reverse Flyes",sets:3,reps:"12-15"},
    {name:"Cable Push-Down",sets:3,reps:"10-12"},{name:"Hammer Curls",sets:2,reps:"10-12"},
    {name:"Bench Press",sets:3,reps:"6-8"}
  ]}
];

const STORAGE_KEY = "workout-app-data";
let state = {
  templates: DEFAULT_TEMPLATES,
  logs: [],
  exercises: [],
  trainingPlans: DEFAULT_TRAINING_PLANS,
  currentPlanId: null,
  view: "plans",
  currentWorkout: null,
  setsMap: {}
};
let modalCallback = null;

const uid = () => Math.random().toString(36).slice(2, 10);
const todayStr = () => new Date().toISOString().slice(0, 10);
function parseReps(r) {
  if (typeof r === "number") return r;
  const s = String(r), m = s.match(/(\d+)\s*[-–]\s*(\d+)/);
  if (m) return parseInt(m[2]);
  const n = parseInt(s);
  return isNaN(n) ? 0 : n;
}
function initSetsData(ex) {
  const dr = parseReps(ex.reps);
  return Array.from({length: ex.sets}, (_, i) => ({ id: uid(), setNum: i+1, weight: "", reps: dr, completed: false }));
}
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function normName(n) {
  return String(n || "")
    .toLowerCase()
    .replace(/[.,()'"`]/g, "")
    .replace(/[-_/]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}
function resolveExerciseId(name, { create = true } = {}) {
  const key = normName(name);
  if (!key) return null;
  const hit = state.exercises.find(e =>
    normName(e.name) === key || (e.aliases || []).some(a => normName(a) === key)
  );
  if (hit) {
    if (name && name !== hit.name && !(hit.aliases || []).includes(name)) {
      (hit.aliases = hit.aliases || []).push(name);
    }
    return hit.id;
  }
  if (!create) return null;
  const rec = { id: uid(), name: name.trim(), aliases: [] };
  state.exercises.push(rec);
  return rec.id;
}

function loadDataSync() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveDataSync() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      templates: state.templates,
      logs: state.logs,
      exercises: state.exercises,
      trainingPlans: state.trainingPlans,
      currentPlanId: state.currentPlanId
    }));
  } catch(e) { console.error("Save failed:", e); }
}

function showModal(text, cb, confirmText) {
  document.getElementById("modal-text").textContent = text;
  document.getElementById("modal-confirm").textContent = confirmText || "Confirm";
  document.getElementById("modal").classList.remove("hidden");
  modalCallback = cb;
}
function closeModal() { document.getElementById("modal").classList.add("hidden"); modalCallback = null; }
function confirmModal() { if (modalCallback) modalCallback(); closeModal(); }

function render() {
  const app = document.getElementById("app");
  const ha = document.getElementById("header-actions");
  const db = document.getElementById("date-bar");

  if (state.view === "plans") {
    ha.innerHTML = "";
    db.classList.add("hidden");
    app.innerHTML = renderPlans();
  } else if (state.view === "home") {
    ha.innerHTML = `<button onclick="go('templates')">Templates</button><button onclick="go('import')">Import</button><button onclick="go('history')">History</button>`;
    db.textContent = new Date().toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" });
    db.classList.remove("hidden");
    app.innerHTML = renderHome();
  } else if (state.view === "workout") {
    ha.innerHTML = "";
    db.classList.add("hidden");
    app.innerHTML = renderWorkout();
  } else if (state.view === "newWorkout") {
    ha.innerHTML = "";
    db.classList.add("hidden");
    app.innerHTML = renderNewWorkout();
  } else if (state.view === "history") {
    ha.innerHTML = "";
    db.classList.add("hidden");
    app.innerHTML = renderHistory();
  } else if (state.view === "templates") {
    ha.innerHTML = "";
    db.classList.add("hidden");
    app.innerHTML = renderTemplates();
  } else if (state.view === "import") {
    ha.innerHTML = "";
    db.classList.add("hidden");
    app.innerHTML = renderImport();
  } else if (state.view === "editLog") {
    ha.innerHTML = "";
    db.classList.add("hidden");
    app.innerHTML = renderEditLog();
  } else if (state.view === "exerciseHistory") {
    ha.innerHTML = "";
    db.classList.add("hidden");
    app.innerHTML = renderExerciseHistory();
  }
}

function go(view) { state.view = view; render(); }

function renderPlans() {
  let h = `<div class="section"><div class="section-title">Select Training Plan</div>`;
  state.trainingPlans.forEach(p => {
    const count = state.templates.filter(t => t.trainingPlanId === p.id).length;
    h += `<button class="template-btn" onclick="selectPlan('${p.id}')">
      <div class="name">${esc(p.name)}</div>
      <div class="meta">${count} workout${count === 1 ? "" : "s"}</div>
    </button>`;
  });
  h += `<button class="create-btn" onclick="createPlan()">+ Create New Training Plan</button></div>`;
  return h;
}

function selectPlan(id) {
  if (!state.trainingPlans.some(p => p.id === id)) return;
  state.currentPlanId = id;
  saveDataSync();
  go("home");
}

function createPlan() {
  const name = prompt("Training plan name:");
  if (!name || !name.trim()) return;
  const plan = { id: uid(), name: name.trim() };
  state.trainingPlans.push(plan);
  state.currentPlanId = plan.id;
  saveDataSync();
  go("home");
}

function currentPlan() {
  return state.trainingPlans.find(p => p.id === state.currentPlanId) || null;
}

function renderHome() {
  const plan = currentPlan();
  const planName = plan ? plan.name : "Workouts";
  const workouts = state.templates.filter(t => t.trainingPlanId === state.currentPlanId);
  let h = `<div class="section">
    <button class="link-btn" onclick="go('plans')" style="margin-bottom:12px">← Plans</button>
    <div class="section-title">${esc(planName)}</div>`;
  workouts.forEach(t => {
    const totalSets = t.exercises.reduce((a,e) => a + e.sets, 0);
    h += `<button class="template-btn" onclick="startWorkout('${t.id}')">
      <div class="name">${esc(t.name)}</div>
      <div class="meta">${t.exercises.length} exercises · ${totalSets} sets</div>
    </button>`;
  });
  if (workouts.length === 0) {
    h += `<p style="color:var(--text3);font-size:14px;margin:8px 0 12px">No workouts in this plan yet.</p>`;
  }
  h += `<button class="create-btn" onclick="go('newWorkout')">+ Create New Workout</button></div>`;
  return h;
}

function startWorkout(id) {
  const t = state.templates.find(x => x.id === id);
  if (!t) return;
  state.currentWorkout = JSON.parse(JSON.stringify(t));
  state.setsMap = {};
  t.exercises.forEach(ex => { state.setsMap[ex.name] = buildSetsWithLast(ex); });
  state.view = "workout";
  render();
}

function buildSetsWithLast(ex) {
  const sets = initSetsData(ex);
  const last = getLastPerformanceSets(ex.exerciseId);
  if (last && last.length > 0) {
    sets.forEach((s, i) => {
      const src = last[Math.min(i, last.length - 1)];
      if (src && src.weight) { s.weight = String(src.weight); s.prefilled = true; }
    });
  }
  return sets;
}

function renderWorkout() {
  const w = state.currentWorkout;
  let completed = 0, total = 0;
  w.exercises.forEach(ex => {
    const sets = state.setsMap[ex.name] || [];
    total += ex.sets;
    completed += sets.filter(s => s.completed).length;
  });
  const pct = total > 0 ? Math.round((completed/total)*100) : 0;

  let h = `<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <h2 style="font-size:18px;font-weight:600">${esc(w.name)}</h2>
      <button class="cancel-link" onclick="cancelWorkout()">Cancel</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-labels"><span>${completed}/${total} sets</span><span>${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;

  const lastIdx = w.exercises.length - 1;
  w.exercises.forEach((ex, exIdx) => {
    const sets = state.setsMap[ex.name] || [];
    const allDone = sets.length > 0 && sets.every(s => s.completed);
    h += `<div class="exercise-card${allDone ? ' all-done' : ''}">
      <div class="exercise-header">
        <div class="title-wrap">
          <h3 class="${allDone ? 'done' : ''}">${esc(ex.name)}</h3>
          <span class="spec">${ex.sets}×${esc(ex.reps)}</span>
        </div>
        <div class="ex-ctrls">
          <button class="ex-ctrl-btn" onclick="moveExercise(${exIdx},-1)" ${exIdx === 0 ? 'disabled' : ''} aria-label="Move up">↑</button>
          <button class="ex-ctrl-btn" onclick="moveExercise(${exIdx},1)" ${exIdx === lastIdx ? 'disabled' : ''} aria-label="Move down">↓</button>
          <button class="ex-ctrl-btn remove" onclick="removeFromWorkout(${exIdx})" aria-label="Remove">×</button>
        </div>
      </div>`;

    const lastSets = getLastPerformanceSets(ex.exerciseId);
    if (lastSets && lastSets.length > 0) {
      const chips = lastSets.map(s => `<span class="last-set">${esc(String(s.weight||"—"))}×${esc(String(s.reps))}</span>`).join('<span class="last-sep">·</span>');
      h += `<div class="last-hint"><span class="last-label">Last time</span>${chips}</div>`;
    }

    h += `<div class="col-labels"><span class="w">Weight (kg)</span><span class="r">Reps</span><span class="c"></span></div>`;

    const defaultReps = parseReps(ex.reps);
    sets.forEach((s, i) => {
      const repsVal = (s.reps === defaultReps && !s.completed) ? "" : s.reps;
      const isPrefilled = s.weight !== "" && s.prefilled === true && !s.completed;
      h += `<div class="set-row${s.completed ? ' completed' : ''}">
        <span class="set-num">S${s.setNum}</span>
        <input type="text" inputmode="decimal" pattern="[0-9]*\\.?[0-9]*" placeholder="kg" class="weight-input${isPrefilled ? ' prefilled' : ''}"
          value="${esc(String(s.weight))}"
          onchange="updateSet('${esc(ex.name)}',${i},'weight',this.value)">
        <input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="${defaultReps}" class="reps-input"
          value="${repsVal}"
          onchange="updateSet('${esc(ex.name)}',${i},'reps',this.value)">
        <button class="check-btn${s.completed ? ' done' : ''}"
          onclick="toggleSet('${esc(ex.name)}',${i})">✓</button>
      </div>`;
    });
    h += `</div>`;
  });

  const canFinish = completed > 0;
  h += `<button class="add-exercise-btn" onclick="openAddExercisePicker()">+ Add Exercise</button>`;
  h += `<button class="primary-btn finish-btn" ${canFinish ? '' : 'disabled'} onclick="finishWorkout()">Finish Workout</button></div>`;
  return h;
}

function updateSet(exName, idx, field, val) {
  const sets = state.setsMap[exName];
  if (!sets || !sets[idx]) return;
  if (field === "weight") {
    sets[idx].weight = val;
    sets[idx].prefilled = false;
    if (idx === 0 && val) {
      const empties = sets.slice(1).filter(s => !s.weight || s.prefilled);
      if (empties.length > 0) {
        showModal(`Apply ${val} kg to all sets of ${exName}?`, () => {
          sets.forEach(s => { if (!s.weight || s.prefilled) { s.weight = val; s.prefilled = false; } });
          render();
        }, "Apply All");
      }
    }
  } else if (field === "reps") {
    const ex = state.currentWorkout.exercises.find(e => e.name === exName);
    const dr = ex ? parseReps(ex.reps) : 0;
    sets[idx].reps = val === "" ? dr : (parseInt(val) || 0);
  }
}

function toggleSet(exName, idx) {
  const sets = state.setsMap[exName];
  if (!sets || !sets[idx]) return;
  sets[idx].completed = !sets[idx].completed;
  if (sets[idx].completed) sets[idx].prefilled = false;
  render();
}

function cancelWorkout() {
  state.currentWorkout = null;
  state.setsMap = {};
  state.view = "home";
  render();
}

function finishWorkout() {
  const w = state.currentWorkout;
  const log = {
    id: uid(), date: todayStr(), workoutName: w.name,
    exercises: w.exercises.map(ex => ({
      name: ex.name, exerciseId: ex.exerciseId, targetSets: ex.sets, targetReps: ex.reps,
      sets: (state.setsMap[ex.name] || []).map(s => ({...s}))
    }))
  };
  state.logs.push(log);
  saveDataSync();
  state.currentWorkout = null;
  state.setsMap = {};
  state.view = "home";
  render();
}

let newExercises = [];
let editTemplateId = null;
function renderNewWorkout() {
  if (newExercises.length === 0) newExercises = [{ id: uid(), name:"", sets:3, reps:"10" }];
  const editing = editTemplateId !== null;
  const existing = editing ? state.templates.find(t => t.id === editTemplateId) : null;
  const titleText = editing ? "Edit Workout" : "New Workout";
  const saveText = editing ? "Save Changes" : "Save & Start Workout";
  const nameValue = editing && existing ? esc(existing.name) : "";
  let h = `<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-size:18px;font-weight:600">${titleText}</h2>
      <button class="cancel-link-sm" onclick="cancelNewWorkout()">Cancel</button>
    </div>
    <input type="text" id="new-workout-name" placeholder="Workout name" style="font-size:17px;text-align:left;margin-bottom:16px" value="${nameValue}">`;

  newExercises.forEach((ex, i) => {
    h += `<div class="form-exercise">
      <div class="top-row">
        <input type="text" placeholder="Exercise name" value="${esc(ex.name)}"
          onchange="newExercises[${i}].name=this.value">
        ${newExercises.length > 1 ? `<button class="remove-btn" onclick="removeNewEx(${i})">×</button>` : ''}
      </div>
      <div class="bottom-row">
        <div><label>Sets</label><input type="number" inputmode="numeric" value="${ex.sets}"
          onchange="newExercises[${i}].sets=parseInt(this.value)||3"></div>
        <div><label>Reps</label><input type="text" placeholder="e.g. 8-10" value="${esc(ex.reps)}"
          onchange="newExercises[${i}].reps=this.value"></div>
      </div>
    </div>`;
  });

  h += `<button class="add-exercise-btn" onclick="addNewEx()">+ Add Exercise</button>
    <button class="primary-btn" onclick="saveNewWorkout()">${saveText}</button></div>`;
  return h;
}

function addNewEx() { newExercises.push({ id: uid(), name:"", sets:3, reps:"10" }); render(); }
function removeNewEx(i) { newExercises.splice(i, 1); render(); }
function cancelNewWorkout() {
  newExercises = [];
  const wasEditing = editTemplateId !== null;
  editTemplateId = null;
  go(wasEditing ? "templates" : "home");
}

function editTemplate(id) {
  const t = state.templates.find(x => x.id === id);
  if (!t) return;
  editTemplateId = id;
  newExercises = t.exercises.map(e => ({ id: uid(), exerciseId: e.exerciseId, name: e.name, sets: e.sets, reps: e.reps }));
  state.view = "newWorkout";
  render();
}

function saveNewWorkout() {
  const nameEl = document.getElementById("new-workout-name");
  const name = nameEl ? nameEl.value.trim() : "";
  if (!name) return;
  const valid = newExercises.filter(e => e.name.trim());
  if (valid.length === 0) return;
  const exercises = valid.map(e => {
    const nm = e.name.trim();
    return { name: nm, exerciseId: e.exerciseId || resolveExerciseId(nm), sets: parseInt(e.sets)||3, reps: e.reps||"10" };
  });

  if (editTemplateId !== null) {
    const t = state.templates.find(x => x.id === editTemplateId);
    if (t) { t.name = name; t.exercises = exercises; }
    saveDataSync();
    newExercises = [];
    editTemplateId = null;
    go("templates");
    return;
  }

  const template = { id: uid(), trainingPlanId: state.currentPlanId, name, exercises };
  state.templates.push(template);
  saveDataSync();
  newExercises = [];
  startWorkout(template.id);
}

function renderHistory() {
  let h = `<div class="section">
    <div class="history-header">
      <button class="link-btn" onclick="go('home')">← Back</button>
      ${state.logs.length > 0 ? `<button class="export-btn" onclick="exportJSON()">Export JSON</button>` : ''}
    </div>
    <div class="section-title">History</div>`;

  if (state.logs.length === 0) {
    h += `<p style="color:var(--text3);font-size:15px;text-align:center">No workouts logged yet.</p>`;
  } else {
    [...state.logs].reverse().forEach(log => {
      h += `<div class="log-card"><div class="top">
        <span class="name">${esc(log.workoutName)}</span>
        <span class="date">${esc(log.date)}</span></div>`;
      log.exercises.forEach(ex => {
        const done = ex.sets.filter(s => s.completed).map(s => `${s.weight||"—"}×${s.reps}`).join("  ·  ");

        h += `<button class="ex-name" style="background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:0;text-align:left;text-decoration:underline;text-decoration-color:var(--text4)" onclick="showExerciseHistory('${esc(exKey)}','${esc(ex.name)}')">${esc(ex.name)}</button><div class="ex-sets">${esc(done)}</div>`;
      });
      h += `<div class="card-actions">
        <button class="edit-btn" onclick="editLog('${log.id}')">Edit</button>
        <button class="delete-log-btn" onclick="deleteLog('${log.id}')">Delete</button>
      </div></div>`;

function exportJSON() {
  const data = {
    exported: new Date().toISOString(), unit: "kg",
    workouts: state.logs.map(log => ({
      date: log.date, workout: log.workoutName,
      exercises: log.exercises.map(ex => ({
        name: ex.name,
        exerciseId: ex.exerciseId,
        target: { sets: ex.targetSets, reps: ex.targetReps },
        completed: ex.sets.filter(s => s.completed).map(s => ({
          set: s.setNum, weight_kg: parseFloat(s.weight) || null, reps: s.reps
        }))
      }))
    }))
  };
  const json = JSON.stringify(data, null, 2);

  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:200;display:flex;flex-direction:column;padding:16px;";
  overlay.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button id="export-copy" style="background:#22c55e;border:none;border-radius:8px;padding:10px 20px;color:#000;font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer">Copy to Clipboard</button>
      <button id="export-close" style="background:#222;border:none;border-radius:8px;padding:10px 16px;color:#888;font-size:14px;cursor:pointer">Close</button>
    </div>
    <textarea id="export-text" readonly style="flex:1;background:#0a0a0a;color:#e0e0e0;border:1px solid #222;border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;resize:none;outline:none">${esc(json)}</textarea>`;
  document.body.appendChild(overlay);

  document.getElementById("export-copy").onclick = async () => {
    try {
      await navigator.clipboard.writeText(json);
      document.getElementById("export-copy").textContent = "Copied!";
      setTimeout(() => { document.getElementById("export-copy").textContent = "Copy to Clipboard"; }, 1500);
    } catch {
      const ta = document.getElementById("export-text");
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      document.execCommand("copy");
      document.getElementById("export-copy").textContent = "Copied!";
      setTimeout(() => { document.getElementById("export-copy").textContent = "Copy to Clipboard"; }, 1500);
    }
  };
  document.getElementById("export-close").onclick = () => overlay.remove();
}

function renderTemplates() {
  const plan = currentPlan();
  const planName = plan ? plan.name : "";
  let h = `<div class="section">
    <button class="link-btn" onclick="go('home')" style="margin-bottom:16px">← Back</button>
    <div class="section-title">Manage Templates${planName ? " · " + esc(planName) : ""}</div>`;
  state.templates.filter(t => t.trainingPlanId === state.currentPlanId).forEach(t => {
    h += `<div class="template-manage-card">
      <div class="info">

      <div style="display:flex;align-items:center;gap:4px">

        <button class="delete-btn" onclick="deleteTemplate('${t.id}')">×</button>
      </div>

function deleteTemplate(id) {
  const t = state.templates.find(x => x.id === id);
  showModal(`Delete "${t ? t.name : 'template'}"? This cannot be undone.`, () => {
    state.templates = state.templates.filter(t => t.id !== id);

function renderImport() {
  return `<div class="section">
    <button class="link-btn" onclick="go('home')" style="margin-bottom:16px">← Back</button>
    <div class="section-title">Import Workout Data</div>
    <label class="import-upload-area" id="import-drop"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="event.preventDefault();this.classList.remove('dragover');importJSON(event.dataTransfer.files[0])">
      <input type="file" accept=".json,application/json" onchange="importJSON(this.files[0])">
      <div class="upload-icon">↑</div>
      <div class="upload-text">Tap to select JSON file</div>
      <div class="upload-hint">Same format as Export JSON</div>
    </label>
    <div id="import-status"></div>
  </div>`;
}

function importJSON(file) {
  const statusEl = document.getElementById("import-status");
  if (!file) return;
  if (!file.name.endsWith(".json") && file.type !== "application/json") {
    statusEl.className = "import-status error";
    statusEl.textContent = "Please select a JSON file.";
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.workouts || !Array.isArray(data.workouts)) {
        statusEl.className = "import-status error";
        statusEl.textContent = "Invalid format: missing 'workouts' array.";
        return;
      }
      const existing = new Set(state.logs.map(l => l.date + "|" + l.workoutName));
      let imported = 0, skipped = 0;
      data.workouts.forEach(w => {
        if (existing.has(w.date + "|" + w.workout)) { skipped++; return; }
        state.logs.push({
          id: uid(),
          date: w.date,
          workoutName: w.workout,
          exercises: w.exercises.map(ex => ({
            name: ex.name,
            exerciseId: ex.exerciseId || resolveExerciseId(ex.name),
            targetSets: ex.target.sets,
            targetReps: String(ex.target.reps),
            sets: ex.completed.map(s => ({
              id: uid(), setNum: s.set,
              weight: s.weight_kg != null ? String(s.weight_kg) : "",
              reps: s.reps || 0, completed: true
            }))
          }))
        });
        existing.add(w.date + "|" + w.workout);
        imported++;
      });
      saveDataSync();
      if (imported > 0) {
        statusEl.className = "import-status success";
        statusEl.textContent = `Imported ${imported} workout${imported !== 1 ? "s" : ""}` +
          (skipped > 0 ? ` (${skipped} duplicate${skipped !== 1 ? "s" : ""} skipped)` : "") + ".";
      } else {
        statusEl.className = "import-status error";
        statusEl.textContent = `No new workouts to import (${skipped} duplicate${skipped !== 1 ? "s" : ""} skipped).`;
      }
    } catch (err) {
      statusEl.className = "import-status error";
      statusEl.textContent = "Failed to parse JSON: " + err.message;
    }
  };
  reader.readAsText(file);
}

function getLastPerformanceSets(exerciseId) {
  if (!exerciseId) return null;
  for (let i = state.logs.length - 1; i >= 0; i--) {
    const ex = state.logs[i].exercises.find(e => e.exerciseId === exerciseId);
    if (ex) {
      const done = ex.sets.filter(s => s.completed);
      if (done.length > 0) return done;
    }
  }
  return null;
}

function removeFromWorkout(exIdx) {
  const w = state.currentWorkout;
  if (!w || !w.exercises[exIdx]) return;
  const ex = w.exercises[exIdx];
  showModal(`Remove "${ex.name}" from this workout?`, () => {
    w.exercises.splice(exIdx, 1);
    delete state.setsMap[ex.name];
    render();
  }, "Remove");
}

function moveExercise(exIdx, dir) {
  const w = state.currentWorkout;
  if (!w) return;
  const arr = w.exercises;
  const newIdx = exIdx + dir;
  if (newIdx < 0 || newIdx >= arr.length) return;
  [arr[exIdx], arr[newIdx]] = [arr[newIdx], arr[exIdx]];
  render();
}

function openAddExercisePicker() {
  const inWorkout = new Set(state.currentWorkout.exercises.map(e => e.exerciseId).filter(Boolean));
  const items = state.exercises
    .filter(e => !inWorkout.has(e.id))
    .map(e => {
      const sets = getLastPerformanceSets(e.id);
      const summary = sets ? sets.map(s => `${s.weight||"—"}×${s.reps}`).join(" · ") : "";
      return { id: e.id, name: e.name, summary };
    })
    .sort((a, b) => a.name.localeCompare(b.name));

  const overlay = document.createElement("div");
  overlay.className = "swap-picker";
  overlay.innerHTML = `
    <div class="swap-picker-box">
      <div class="swap-picker-head">
        <h3>Add Exercise</h3>
        <button class="swap-picker-close" id="add-close" aria-label="Close">×</button>
      </div>
      <input type="text" class="swap-picker-search" id="add-search"
        placeholder="Search or type a new exercise..." autocomplete="off" autocapitalize="words">
      <div class="swap-picker-list" id="add-list">
        ${items.length === 0
          ? `<div class="swap-picker-empty">No exercises yet. Type a name above.</div>`
          : items.map(it => `<button class="swap-picker-item" data-id="${esc(it.id)}" data-name="${esc(it.name)}">
              <span>${esc(it.name)}</span>
              ${it.summary ? `<span class="item-meta">${esc(it.summary)}</span>` : ''}
            </button>`).join('')}
      </div>
      <div class="add-ex-fields">
        <div><label>Sets</label><input type="number" inputmode="numeric" id="add-sets" value="3"></div>
        <div><label>Reps</label><input type="text" id="add-reps" value="8-10"></div>
      </div>
      <button class="primary-btn" id="add-confirm" disabled>Add</button>
    </div>`;
  document.body.appendChild(overlay);

  const search = document.getElementById('add-search');
  const list = document.getElementById('add-list');
  const setsInput = document.getElementById('add-sets');
  const repsInput = document.getElementById('add-reps');
  const confirmBtn = document.getElementById('add-confirm');
  let selectedId = null;

  const updateConfirm = () => { confirmBtn.disabled = !search.value.trim(); };
  search.addEventListener('input', () => {
    const q = search.value.toLowerCase().trim();
    selectedId = null;
    Array.from(list.children).forEach(btn => {
      if (!btn.dataset || !btn.dataset.name) return;
      btn.style.display = btn.dataset.name.toLowerCase().includes(q) ? '' : 'none';
    });
    updateConfirm();
  });
  list.addEventListener('click', e => {
    const btn = e.target.closest('.swap-picker-item');
    if (!btn) return;
    search.value = btn.dataset.name;
    selectedId = btn.dataset.id;
    updateConfirm();
  });
  document.getElementById('add-close').onclick = () => overlay.remove();
  confirmBtn.onclick = () => {
    const name = search.value.trim();
    if (!name) return;
    const sets = parseInt(setsInput.value) || 3;
    const reps = (repsInput.value || "").trim() || "8-10";
    addExerciseToWorkout(name, sets, reps, selectedId);
    overlay.remove();
  };
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

function addExerciseToWorkout(name, sets, reps, exerciseId) {
  const w = state.currentWorkout;
  if (!w) return;
  let finalName = name;
  while (state.setsMap[finalName]) finalName += " (2)";
  const ex = {
    name: finalName,
    exerciseId: exerciseId || resolveExerciseId(name),
    sets: Math.max(1, parseInt(sets) || 3),
    reps: reps || "8-10"
  };
  w.exercises.push(ex);
  state.setsMap[finalName] = buildSetsWithLast(ex);
  render();
}

function showExerciseHistory(exerciseId, exName) {
  state.exerciseHistoryId = exerciseId;
  state.exerciseHistoryName = exName;
  state.view = "exerciseHistory";
  render();
}

function renderExerciseHistory() {
  const id = state.exerciseHistoryId;
  const rec = id ? state.exercises.find(e => e.id === id) : null;
  const name = (rec && rec.name) || state.exerciseHistoryName || "Exercise";
  let h = `<div class="section">
    <button class="link-btn" onclick="go('history')" style="margin-bottom:16px">← Back</button>
    <div class="section-title">${esc(name)} History</div>
    <div class="ex-history-card"><div class="ex-h-name">${esc(name)}</div>`;

  let found = false;
  [...state.logs].reverse().forEach(log => {
    const ex = log.exercises.find(e => id ? e.exerciseId === id : e.name === name);
    if (!ex) return;
    const done = ex.sets.filter(s => s.completed);
    if (done.length === 0) return;
    found = true;
    const summary = done.map(s => `${s.weight||"—"}×${s.reps}`).join("  ·  ");
    h += `<div class="ex-h-row"><span class="ex-h-date">${esc(log.date)}</span><span class="ex-h-data">${esc(summary)}</span></div>`;
  });
  if (!found) h += `<p style="color:var(--text3);font-size:13px">No history yet.</p>`;
  h += `</div></div>`;
  return h;
}

let editLogData = null;

function editLog(logId) {
  const log = state.logs.find(l => l.id === logId);
  if (!log) return;
  editLogData = JSON.parse(JSON.stringify(log));
  state.view = "editLog";
  render();
}

function renderEditLog() {
  const log = editLogData;
  if (!log) { go("history"); return ""; }
  let h = `<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button class="link-btn" onclick="cancelEditLog()">← Cancel</button>
      <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">${esc(log.date)}</span>
    </div>
    <h2 style="font-size:18px;font-weight:600;margin-bottom:16px">${esc(log.workoutName)}</h2>`;

  log.exercises.forEach((ex, ei) => {
    h += `<div class="exercise-card">
      <div class="exercise-header">
        <h3>${esc(ex.name)}</h3>
        <span class="spec">${ex.targetSets}×${esc(String(ex.targetReps))}</span>
      </div>
      <div class="col-labels"><span class="w">Weight</span><span class="r">Reps</span><span class="c"></span></div>`;
    ex.sets.forEach((s, si) => {
      h += `<div class="set-row${s.completed ? '' : ' completed'}">
        <span class="set-num">S${s.setNum}</span>
        <input type="text" inputmode="decimal" pattern="[0-9]*\\.?[0-9]*" placeholder="kg" class="weight-input"
          value="${esc(String(s.weight))}"
          onchange="editLogData.exercises[${ei}].sets[${si}].weight=this.value">
        <input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" class="reps-input"
          value="${s.reps}"
          onchange="editLogData.exercises[${ei}].sets[${si}].reps=parseInt(this.value)||0">
        <button class="check-btn${s.completed ? ' done' : ''}"
          onclick="editLogData.exercises[${ei}].sets[${si}].completed=!editLogData.exercises[${ei}].sets[${si}].completed;render()">✓</button>
      </div>`;
    });
    h += `</div>`;
  });

  h += `<button class="primary-btn finish-btn" onclick="saveEditLog()">Save Changes</button></div>`;
  return h;
}

function cancelEditLog() { editLogData = null; go("history"); }

function saveEditLog() {
  if (!editLogData) return;
  const idx = state.logs.findIndex(l => l.id === editLogData.id);
  if (idx >= 0) {
    state.logs[idx] = editLogData;
    saveDataSync();
  }
  editLogData = null;
  go("history");
}

function deleteLog(logId) {
  const log = state.logs.find(l => l.id === logId);
  showModal(`Delete workout from ${log ? log.date : ""}? This cannot be undone.`, () => {
    state.logs = state.logs.filter(l => l.id !== logId);
    saveDataSync();
    render();
  });
}

(() => {
  const data = loadDataSync();
  if (data) {
    if (data.templates) state.templates = data.templates;
    if (data.logs) state.logs = data.logs;
    if (data.exercises) state.exercises = data.exercises;
    if (data.trainingPlans && data.trainingPlans.length) state.trainingPlans = data.trainingPlans;
    if (data.currentPlanId) state.currentPlanId = data.currentPlanId;
  }
  state.exercises.forEach(e => { if (!e.aliases) e.aliases = []; });

  if (!state.trainingPlans.some(p => p.id === DEFAULT_PLAN_ID)) {
    state.trainingPlans.unshift({ id: DEFAULT_PLAN_ID, name: "Training Plan 1" });
  }
  state.templates.forEach(t => {
    if (!t.trainingPlanId) t.trainingPlanId = DEFAULT_PLAN_ID;
  });

  state.templates.forEach(t => t.exercises.forEach(e => {
    if (e.name === "Mach. LH Press") e.name = "1 Arm LM Press";
  }));

  const seededId = resolveExerciseId("1 Arm LM Press");
  const seededRec = state.exercises.find(e => e.id === seededId);
  if (seededRec && !seededRec.aliases.includes("Mach. LH Press")) {
    seededRec.aliases.push("Mach. LH Press");
  }

  state.templates.forEach(t => t.exercises.forEach(e => {
    if (!e.exerciseId) e.exerciseId = resolveExerciseId(e.name);
  }));
  state.logs.forEach(l => l.exercises.forEach(e => {
    if (!e.exerciseId) e.exerciseId = resolveExerciseId(e.name);
  }));

  if (state.currentPlanId && state.trainingPlans.some(p => p.id === state.currentPlanId)) {
    state.view = "home";
  } else {
    state.currentPlanId = null;
    state.view = "plans";
  }

  saveDataSync();
  render();
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
})();
</script>
</body>
</html>
